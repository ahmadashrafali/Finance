function sGet(sheet, range) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({sheet: sheet, action: "read", range: range || "A1:Z5000"})
  }).then(function(r){ return r.json(); })
  .then(function(d){ if(d.error) throw new Error(d.error); return {values: d.values || []}; });
}
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxz62S5d5jVmKRIysTDq2rwV6wbmVL2jXqiX1XQnS-1l7vDLeBaOmRQaS5q1OpS6ImErg/exec";

function sAppend(sheet, row) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({sheet: sheet, action: "append", row: row})
  }).then(function(r){ return r.json(); })
  .then(function(d){ if(d.error) throw new Error(d.error); return d; });

function sSetting(key, val) {

function loadSheets() {
  return Promise.all([sGet("Transactions","A2:E5000"), sGet("Settings","A1:B200"), sGet("Monthly","A2:I100")])
  .then(function(res) {
    var rawRows = res[0].values||[];
    // Skip header row if present
    var dataRows = rawRows.filter(function(r){ return r[0] && r[0] !== "Date"; });
    var txns = dataRows.map(function(r,i){
      // r[1] is month - extract YYYY-MM from date string if needed
      var dateStr = String(r[0]||"");
      var monthStr = dateStr.length >= 7 ? dateStr.slice(0,7) : String(r[1]||"");
      return {id:i+1, date:dateStr, month:monthStr, cat:String(r[2]||"other"), 
              amount:parseFloat(r[3])||0, note:String(r[4]||"")};
    }).filter(function(t){return t.amount>0;});
    console.log("Loaded transactions:", txns.length, txns.length>0?txns[0]:"none");

    var sm = {};
    (res[1].values||[]).forEach(function(r){if(r[0]) sm[r[0]]=r[1];});

    var ibkrH = [];

// ---- CONSTANTS ----
var SAR_USD=1/3.75, SALARY=140000;
var EGP_A=432225, EGP_B=638934, EGP_AXA=25000, EGP_M=1707225;
var FB=10417+2150+1357;

function pSAR(rate,type){return type==="A"?EGP_A/rate:type==="B"?EGP_B/rate:0;}
function axaSAR(rate){return EGP_AXA/rate;}
function mSAR(rate){return EGP_M/rate;}
function mType(m){var n=parseInt(m.slice(5,7));return [1,4,7,10].includes(n)?"A":[2,5,8,11].includes(n)?"B":"light";}
function mLabel(m){var p=m.split("-");return new Date(+p[0],+p[1]-1).toLocaleString("en-GB",{month:"short",year:"2-digit"});}
function prevM(m){var d=new Date(m+"-01");d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}

var CATS=[
  {key:"food",  label:"Food Delivery", color:"#E8A838"},
  {key:"ride",  label:"Ride Hailing",  color:"#4A9EFF"},
  {key:"shop",  label:"Shopping",      color:"#B07BC0"},
  {key:"rest",  label:"Restaurants",   color:"#E07070"},
  {key:"fun",   label:"Entertainment", color:"#50C878"},
  {key:"groc",  label:"Groceries",     color:"#7AABCC"},
  {key:"health",label:"Health",        color:"#F0A0A0"},
  {key:"cash",  label:"Cash",          color:"#A0A0A0"},
  {key:"other", label:"Other",         color:"#888888"},
];

var FSC=[
  {label:"Me + Parents -> Egypt",        ahmad:60000,parents:24000},
  {label:"Me -> Spain, Parents -> Egypt",ahmad:90000,parents:24000},
  {label:"Me -> Egypt, Parents -> USA",  ahmad:60000,parents:66000},
  {label:"Me -> Spain, Parents -> USA",  ahmad:90000,parents:66000},
];

function calcFire(idx,ibkr,mo,ret,swr){
  var sc=FSC[Math.min(idx,3)];
  var spend=sc.ahmad+sc.parents+6000-8000;
  var fn=spend/(Math.max(0.01,swr)/100);
  var mr=(Math.max(0,ret)/100)/12;
  var v=Math.max(0,ibkr),months=0;
  while(v<fn&&months<600){v=v*(1+mr)+Math.max(0,mo);months++;}
  var pct=fn>0?Math.min(100,(ibkr/fn)*100):0;
  return {spend:spend,fireNum:fn,months:months,years:(months/12).toFixed(1),age:(33+months/12).toFixed(1),pct:isNaN(pct)?0:pct};
}

var fK=function(n){return n>=1e6?"$"+(n/1e6).toFixed(2)+"M":"$"+Math.round(n/1000)+"K";};

// Simple SVG line chart - no library needed
function LineChart(props){
  var data=props.data||[], w=props.width||300, ht=props.height||180;
  if(!data.length) return null;
  var pad={t:10,r:60,b:20,l:45};
  var iw=w-pad.l-pad.r, ih=ht-pad.t-pad.b;
  var maxV=Math.max.apply(null,data.map(function(d){return d.v;}));
  var minV=0;
  var xS=function(i){return pad.l+(i/(data.length-1))*iw;};
  var yS=function(v){return pad.t+ih-(((v-minV)/(maxV-minV||1))*ih);};
  var pts=data.map(function(d,i){return xS(i)+","+yS(d.v);}).join(" ");
  // FIRE reference line
  var fireY=props.fireNum?yS(Math.min(props.fireNum,maxV)):null;
  // Year labels
  var yLabels=[];
  data.forEach(function(d,i){if(d.m%12===0&&d.m>0){yLabels.push({x:xS(i),label:"Yr"+(d.m/12)});}});
  // Y axis labels
  var yTicks=[0,maxV*0.25,maxV*0.5,maxV*0.75,maxV];

  return h("svg",{width:"100%",height:ht,viewBox:"0 0 "+w+" "+ht},
    // Grid lines
    yTicks.map(function(v,i){
      return h("line",{key:"g"+i,x1:pad.l,y1:yS(v),x2:w-pad.r,y2:yS(v),
        stroke:T.border,strokeDasharray:"3,3"});
    }),
    // Y axis labels
    yTicks.filter(function(v){return v>0;}).map(function(v,i){
      return h("text",{key:"yl"+i,x:pad.l-4,y:yS(v)+4,textAnchor:"end",
        fontSize:7,fill:T.muted},fK(v));
    }),
    // FIRE reference line
    fireY && fireY > pad.t && fireY < pad.t+ih ? h("g",null,
      h("line",{x1:pad.l,y1:fireY,x2:w-pad.r,y2:fireY,
        stroke:T.gold,strokeDasharray:"5,3",strokeWidth:1}),
      h("text",{x:w-pad.r+2,y:fireY+4,fontSize:7,fill:T.gold},"FIRE "+fK(props.fireNum))
    ) : null,
    // Line
    h("polyline",{points:pts,fill:"none",stroke:T.green,strokeWidth:2,strokeLinejoin:"round"}),
    // X labels
    yLabels.map(function(l,i){
      return h("text",{key:"xl"+i,x:l.x,y:ht-4,textAnchor:"middle",fontSize:7,fill:T.muted},l.label);
    })
  );
}

var TABS=["Today","Month","History","FIRE","Reserve","Rates"];

// ---- APP ----
function App(){
  var ss=useState(defs); var s=ss[0]; var setS=ss[1];
  var ls=useState(false); var loaded=ls[0]; var setLoaded=ls[1];
  var sy=useState(false); var syncing=sy[0]; var setSyncing=sy[1];
  var ts=useState(null); var toast=ts[0]; var setToast=ts[1];
  var tb=useState("Today"); var tab=tb[0]; var setTab=tb[1];
  var sa=useState(false); var showAdd=sa[0]; var setShowAdd=sa[1];
  var nc=useState("food"); var newCat=nc[0]; var setNewCat=nc[1];
  var na=useState(""); var newAmt=na[0]; var setNewAmt=na[1];
  var nn=useState(""); var newNote=nn[0]; var setNewNote=nn[1];
  var ec=useState(false); var editCaps=ec[0]; var setEditCaps=ec[1];
  var ii=useState(""); var ibkrInput=ii[0]; var setIbkrInput=ii[1];
  var im=useState(new Date().toISOString().slice(0,7)); var ibkrMonth=im[0]; var setIbkrMonth=im[1];
  var fr=useState(8); var fireRet=fr[0]; var setFireRet=fr[1];
  var fw=useState(3.5); var fireSwr=fw[0]; var setFireSwr=fw[1];
  var rm=useState("ibkr"); var rollMode=rm[0]; var setRollMode=rm[1];
  var cc=useState(false); var confirmClose=cc[0]; var setConfirmClose=cc[1];

  function msg(m,err){setToast({msg:m,err:err});setTimeout(function(){setToast(null);},3000);}

  useEffect(function(){
    setSyncing(true);
    loadSheets().then(function(d){
      setS(d);setLoaded(true);setSyncing(false);
    }).catch(function(){
      // Retry once after 3 seconds (Apps Script cold start)
      setTimeout(function(){
        loadSheets().then(function(d){
          setS(d);setLoaded(true);setSyncing(false);
        }).catch(function(){
          setLoaded(true);setSyncing(false);
        });
      }, 3000);
    });
  },[]);

  var update=useCallback(function(p){setS(function(prev){return Object.assign({},prev,p);});},[]);

  var NM=new Date().toISOString().slice(0,7);
  var TD=new Date().toISOString().slice(0,10);

  var mTxns=useMemo(function(){return s.transactions.filter(function(t){return t.month===NM;});},[s.transactions,NM]);
  var tTxns=useMemo(function(){return s.transactions.filter(function(t){return t.date===TD;}).reverse();},[s.transactions,TD]);

  var spent=useMemo(function(){
    var m={};CATS.forEach(function(c){m[c.key]=0;});
    mTxns.forEach(function(t){if(m[t.cat]!==undefined)m[t.cat]+=t.amount;});
    return m;
  },[mTxns]);

  var totalVar=Object.values(spent).reduce(function(a,b){return a+b;},0);
  var mt=mType(NM);
  var pc=pSAR(s.egpRate,mt);
  var ft=FB+axaSAR(s.egpRate)+pc;
  var to=ft+totalVar;
  var inv=SALARY-to;
  var rc=inv>40000?T.green:inv>0?"#E8A838":T.red;

  var avgI=useMemo(function(){
    if(s.ibkrHistory.length>0) return s.ibkrHistory.reduce(function(a,h){return a+h.usd;},0)/s.ibkrHistory.length;
    return Math.max(0,inv)*SAR_USD;
  },[s.ibkrHistory,inv]);

  var fire=useMemo(function(){return calcFire(s.fireIdx,s.ibkrValue,avgI,fireRet,fireSwr);},[s.fireIdx,s.ibkrValue,avgI,fireRet,fireSwr]);

  var gData=useMemo(function(){
    var mr=(Math.max(0,fireRet)/100)/12;
    var mo=Math.max(0,avgI);
    var len=Math.min(120,Math.max(24,(fire.months||72)+6));
    var v=Math.max(0,s.ibkrValue);
    return Array.from({length:len},function(_,i){var pt={m:i,v:Math.round(v)};v=v*(1+mr)+mo;return pt;});
  },[s.ibkrValue,avgI,fireRet,fire.months]);

  var hMonths=useMemo(function(){
    return s.monthHistory.slice().sort(function(a,b){return b.month.localeCompare(a.month);}).slice(0,4);
  },[s.monthHistory]);

  function addTxn(){
    var amt=parseFloat(newAmt);
    if(!amt||isNaN(amt)||amt<=0) return;
    var txn={id:Date.now(),date:TD,month:NM,cat:newCat,amount:amt,note:newNote};
    update({transactions:s.transactions.concat([txn])});
    setNewAmt("");setNewNote("");setShowAdd(false);
    sAppend("Transactions",[TD,NM,newCat,amt,newNote])
      .then(function(){msg("Saved to Google Sheets");})
      .catch(function(){msg("Saved locally - Sheets failed",true);});
  }

  function delTxn(id){update({transactions:s.transactions.filter(function(t){return t.id!==id;})});msg("Deleted");}

  function logIBKR(){
    if(!ibkrInput||isNaN(+ibkrInput)) return;
    var ex=s.ibkrHistory.filter(function(h){return h.month!==ibkrMonth;});
    var nh=ex.concat([{month:ibkrMonth,usd:+ibkrInput}]);
    update({ibkrHistory:nh});
    sSetting("ibkrHistory",nh).then(function(){msg("IBKR deposit saved");}).catch(function(){msg("Saved locally only",true);});
    setIbkrInput("");
  }

  function updIBKR(v){update({ibkrValue:v});sSetting("ibkrValue",v).catch(function(){});}
  function updEGP(v){update({egpRate:v});sSetting("egpRate",v).catch(function(){});}
  function updCash(v){update({cashReserve:v});sSetting("cashReserve",v).catch(function(){});}
  function updCap(k,v){var nc=Object.assign({},s.caps);nc[k]=v;update({caps:nc});sSetting("caps",nc).catch(function(){});}

    var ex=s.monthHistory.filter(function(h){return h.month!==NM;});

  return h("div",{style:{minHeight:"100vh",background:T.bg,color:T.text,maxWidth:430,margin:"0 auto",paddingBottom:82}},

    // HEADER

      borderBottom:"1px solid "+T.border,position:"sticky",top:0,zIndex:50}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h("div",null,
          h("div",{style:{fontSize:9,color:T.gold,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:2}},"Financial Command"),
          h("div",{style:{fontSize:20,fontWeight:800,letterSpacing:"-0.03em"}},"Ahmad Ashraf"),
          h("div",{style:{fontSize:10,color:T.sub,marginTop:1}},new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}))
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:9,color:T.sub,textTransform:"uppercase"}},"IBKR"),
          h(Mono,{style:{fontSize:20,fontWeight:800,color:T.gold,display:"block"}},fU(s.ibkrValue)),
          h("div",{style:{fontSize:9,color:fire.pct>50?T.green:T.sub}},fire.pct.toFixed(1)+"% to FIRE")

      ),
      h("div",{style:{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,

              fetch(SCRIPT_URL, {
                method:"POST",
                headers:{"Content-Type":"text/plain"},
                body:JSON.stringify({sheet:"Transactions",action:"read",range:"A2:E5000"})
              }).then(function(r){return r.json();})
              .then(function(d){
                if(d.error) { msg("Script error: "+d.error, true); setSyncing(false); return; }
                if(!d.values || !d.values.length) { msg("Script OK but sheet empty", true); setSyncing(false); return; }
                msg("Script OK - "+d.values.length+" rows found");
                return loadSheets().then(function(data){setS(data);setLoaded(true);setSyncing(false);msg(data.transactions.length+' transactions loaded');});
              }).catch(function(e){msg("Fetch failed: "+(e.message||e), true);setSyncing(false);});
            },
            style:{width:"100%",background:T.gold,border:"none",borderRadius:8,color:"#07080B",
              fontWeight:700,fontSize:12,padding:"12px",cursor:"pointer",marginBottom:10}},
            syncing?"Testing...":"Test & Refresh from Sheets"),
          h("div",{style:{fontSize:10,color:T.sub,lineHeight:1.6}},
            "All data stored in your Google Sheet. View or edit at sheets.google.com anytime.")
        )
      )
    ),

    // BOTTOM NAV
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
      width:"100%",maxWidth:430,background:T.card+"F2",
      backdropFilter:"blur(20px)",borderTop:"1px solid "+T.border,
      display:"flex",justifyContent:"space-around",padding:"6px 0 14px",zIndex:100}},
      TABS.map(function(t){
        return h("button",{key:t,onClick:function(){setTab(t);},
          style:{background:"none",border:"none",cursor:"pointer",display:"flex",
            flexDirection:"column",alignItems:"center",gap:2,padding:"5px 8px"}},
          h("span",{style:{fontSize:11,fontWeight:tab===t?700:400,
            color:tab===t?T.gold:T.muted,letterSpacing:"0.06em",textTransform:"uppercase"}},t)
        );
      })
    )
  );
}

var root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App,null));

}); // end window.onload
</script>
</body>
</html>
