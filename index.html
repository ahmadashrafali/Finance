// ---- SHEETS HELPERS ---------------------------------------------------------
async function sheetsGet(range) {
  const r = await fetch(`${BASE_URL}/values/${encodeURIComponent(range)}?key=${API_KEY}`);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sheetsAppend(sheet, row) {
  const r = await fetch(
    `${BASE_URL}/values/${encodeURIComponent(sheet)}:append?valueInputOption=RAW&key=${API_KEY}`,
    { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ values: [row] }) }
  );
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sheetsClear(sheet) {
  const r = await fetch(`${BASE_URL}/values/${encodeURIComponent(sheet)}:clear?key=${API_KEY}`,
    { method: "POST" });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sheetsWrite(sheet, rows) {
  await sheetsClear(sheet);
  if (!rows.length) return;
  const r = await fetch(
    `${BASE_URL}/values/${encodeURIComponent(sheet)}:append?valueInputOption=RAW&key=${API_KEY}`,
    { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ values: rows }) }
  );
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ---- LOAD FROM SHEETS -------------------------------------------------------
async function loadFromSheets() {
  const d = defaults();
  try {
    const [txnRes, setRes, monRes] = await Promise.all([
      sheetsGet("Transactions!A2:E5000"),
      sheetsGet("Settings!A1:B100"),
      sheetsGet("Monthly!A2:I100"),
    ]);

    // Transactions
    const transactions = (txnRes.values || []).map((row, i) => ({
      id: i + 1,
      date:   row[0] || "",
      month:  row[1] || "",
      cat:    row[2] || "other",
      amount: parseFloat(row[3]) || 0,
      note:   row[4] || "",
    })).filter(t => t.amount > 0);

    // Settings - last value per key wins
    const settingsMap = {};
    (setRes.values || []).forEach(row => { if (row[0]) settingsMap[row[0]] = row[1]; });

    let caps = { ...d.caps };
    try { if (settingsMap.caps) caps = JSON.parse(settingsMap.caps); } catch(e) {}
    let ibkrHistory = [];
    try { if (settingsMap.ibkrHistory) ibkrHistory = JSON.parse(settingsMap.ibkrHistory); } catch(e) {}

    // Monthly history
    const monthHistory = (monRes.values || []).map(row => {
      let cats = {}, mcaps = {};
      try { cats  = JSON.parse(row[7] || "{}"); } catch(e) {}
      try { mcaps = JSON.parse(row[8] || "{}"); } catch(e) {}
      return {
        month: row[0] || "", investedSAR: parseFloat(row[1]) || 0,
        investedUSD: parseFloat(row[2]) || 0, surplusSAR: parseFloat(row[3]) || 0,
        fixedTotal:  parseFloat(row[4]) || 0, totalOut:   parseFloat(row[5]) || 0,
        rollMode: row[6] || "ibkr", cats, caps: mcaps,
      };
    }).filter(h => h.month);

    return {
      egpRate:     parseFloat(settingsMap.egpRate)     || d.egpRate,
      ibkrValue:   parseFloat(settingsMap.ibkrValue)   || d.ibkrValue,
      cashReserve: parseFloat(settingsMap.cashReserve) || d.cashReserve,
      fireIdx:     parseInt(settingsMap.fireIdx)        || 0,
      caps, ibkrHistory, transactions, monthHistory,
    };
  } catch(e) {
    console.warn("Sheets load failed:", e);
    // Fall back to localStorage
    try {
      const local = localStorage.getItem("ahmad-finance");
      if (local) return { ...d, ...JSON.parse(local) };
    } catch(e2) {}
    return d;
  }
}

// Save setting
async function saveSetting(key, value) {
  const val = typeof value === "object" ? JSON.stringify(value) : String(value);
  await sheetsAppend("Settings", [key, val]);
  // Also mirror to localStorage
  try {
    const local = JSON.parse(localStorage.getItem("ahmad-finance") || "{}");
    local[key] = value;
    localStorage.setItem("ahmad-finance", JSON.stringify(local));
  } catch(e) {}
}

// ---- CONSTANTS --------------------------------------------------------------
const SAR_USD  = 1 / 3.75;
const SALARY   = 140000;
const EGP_A    = 432225;
const EGP_B    = 638934;
const EGP_AXA  = 25000;
const EGP_M    = 1275000 + 432225;
const FIXED_BASE = 10417 + 2150 + 1357;

const propSAR   = (rate, type) => type === "A" ? EGP_A/rate : type === "B" ? EGP_B/rate : 0;
const axaSAR    = (rate) => EGP_AXA / rate;
const maintSAR  = (rate) => EGP_M   / rate;

function getMonthType(m) {
  const n = parseInt(m.slice(5,7));
  if ([1,4,7,10].includes(n)) return "A";
  if ([2,5,8,11].includes(n)) return "B";
  return "light";
}

function monthLabel(m) {
  const [y, mo] = m.split("-");
  return new Date(+y, +mo-1).toLocaleString("en-GB", { month:"short", year:"2-digit" });
}

function prevMonthStr(m) {
  const d = new Date(m + "-01");
  d.setMonth(d.getMonth() - 1);
  return d.toISOString().slice(0,7);
}

// ---- CATEGORIES -------------------------------------------------------------
const CATS = [
  { key:"food",   label:"Food Delivery",  color:"#E8A838" },
  { key:"ride",   label:"Ride Hailing",   color:"#4A9EFF" },
  { key:"shop",   label:"Shopping",       color:"#B07BC0" },

// ---- FIRE -------------------------------------------------------------------
const FIRE_SC = [
  { label:"Me + Parents -> Egypt",         ahmad:60000, parents:24000 },
  { label:"Me -> Spain, Parents -> Egypt", ahmad:90000, parents:24000 },
  { label:"Me -> Egypt, Parents -> USA",   ahmad:60000, parents:66000 },
  { label:"Me -> Spain, Parents -> USA",   ahmad:90000, parents:66000 },
];

function calcFire(idx, ibkr, monthly, ret, swr) {
  const sc = FIRE_SC[Math.min(idx, 3)];
  const spend = sc.ahmad + sc.parents + 6000 - 8000;
  const fireNum = spend / (Math.max(0.01, swr) / 100);
  const mr = (Math.max(0, ret) / 100) / 12;
  const mo = Math.max(0, monthly);
  let v = Math.max(0, ibkr), months = 0;
  while (v < fireNum && months < 600) { v = v*(1+mr)+mo; months++; }
  const pct = fireNum > 0 ? Math.min(100, (ibkr/fireNum)*100) : 0;
  return { spend, fireNum, months, years:(months/12).toFixed(1),
    age:(33+months/12).toFixed(1), pct: isNaN(pct) ? 0 : pct };
}

const TABS = ["Today","Month","History","FIRE","Reserve","Rates"];

// ---- APP --------------------------------------------------------------------
export default function App() {
  const [s, setS]             = useState(defaults);
  const [loaded, setLoaded]   = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [toast, setToast]     = useState(null);
  const [tab, setTab]         = useState("Today");
  const [showAdd, setShowAdd] = useState(false);
  const [newCat, setNewCat]   = useState("food");
  const [newAmt, setNewAmt]   = useState("");
  const [newNote, setNewNote] = useState("");
  const [editCaps, setEditCaps]   = useState(false);
  const [ibkrInput, setIbkrInput] = useState("");
  const [ibkrMonth, setIbkrMonth] = useState(new Date().toISOString().slice(0,7));
  const [fireRet, setFireRet] = useState(8);
  const [fireSwr, setFireSwr] = useState(3.5);
  const [rollMode, setRollMode] = useState("ibkr");
  const [confirmClose, setConfirmClose] = useState(false);

  function showMsg(msg, err=false) {
    setToast({ msg, err });
    setTimeout(() => setToast(null), 3000);
  }

  useEffect(() => {
    setSyncing(true);
    loadFromSheets().then(data => { setS(data); setLoaded(true); setSyncing(false); });
  }, []);

  const update = useCallback(patch => setS(p => ({ ...p, ...patch })), []);

  const NOW_MONTH = new Date().toISOString().slice(0,7);
  const TODAY     = new Date().toISOString().slice(0,10);

  const monthTxns = useMemo(() => s.transactions.filter(t => t.month === NOW_MONTH), [s.transactions, NOW_MONTH]);
  const todayTxns = useMemo(() => s.transactions.filter(t => t.date === TODAY).reverse(), [s.transactions, TODAY]);

  const spent = useMemo(() => {
    const m = Object.fromEntries(CATS.map(c => [c.key, 0]));
    monthTxns.forEach(t => { if (m[t.cat] !== undefined) m[t.cat] += t.amount; });
    return m;
  }, [monthTxns]);

  const totalVar   = Object.values(spent).reduce((a,b) => a+b, 0);
  const monthType  = getMonthType(NOW_MONTH);
  const propCost   = propSAR(s.egpRate, monthType);
  const fixedTotal = FIXED_BASE + axaSAR(s.egpRate) + propCost;
  const totalOut   = fixedTotal + totalVar;
  const investable = SALARY - totalOut;
  const remColor   = investable > 40000 ? T.green : investable > 0 ? "#E8A838" : T.red;

  const avgIBKR = useMemo(() => {
    if (s.ibkrHistory.length > 0)
      return s.ibkrHistory.reduce((a,h) => a+h.usd, 0) / s.ibkrHistory.length;
    return Math.max(0, investable) * SAR_USD;
  }, [s.ibkrHistory, investable]);

  const fire = useMemo(() => calcFire(s.fireIdx, s.ibkrValue, avgIBKR, fireRet, fireSwr),
    [s.fireIdx, s.ibkrValue, avgIBKR, fireRet, fireSwr]);

  const growthData = useMemo(() => {
    const mr = (Math.max(0,fireRet)/100)/12;
    const mo = Math.max(0, avgIBKR);
    const len = Math.min(120, Math.max(24, (fire.months||72)+6));
    let v = Math.max(0, s.ibkrValue);
    return Array.from({length:len}, (_,i) => { const pt={m:i,v:Math.round(v)}; v=v*(1+mr)+mo; return pt; });
  }, [s.ibkrValue, avgIBKR, fireRet, fire.months]);

  const historyMonths = useMemo(() =>
    s.monthHistory.slice().sort((a,b) => b.month.localeCompare(a.month)).slice(0,4),
    [s.monthHistory]);

  // ---- ACTIONS --------------------------------------------------------------
  async function addTxn() {
    const amt = parseFloat(newAmt);
    if (!amt || isNaN(amt) || amt <= 0) return;
    const txn = { id: Date.now(), date:TODAY, month:NOW_MONTH, cat:newCat, amount:amt, note:newNote };
    update({ transactions: [...s.transactions, txn] });
    setNewAmt(""); setNewNote(""); setShowAdd(false);
    try {
      await sheetsAppend("Transactions", [TODAY, NOW_MONTH, newCat, amt, newNote]);
      showMsg("Saved to Google Sheets");
    } catch(e) {
      showMsg("Saved locally - Sheets sync failed", true);
    }
  }

  function deleteTxn(id) {
    update({ transactions: s.transactions.filter(t => t.id !== id) });
    showMsg("Deleted - remove from Sheet manually if needed");
  }

  async function logIBKR() {
    if (!ibkrInput || isNaN(+ibkrInput)) return;
    const existing = s.ibkrHistory.filter(h => h.month !== ibkrMonth);
    const newHist  = [...existing, { month:ibkrMonth, usd:+ibkrInput }];
    update({ ibkrHistory: newHist });
    try { await saveSetting("ibkrHistory", newHist); showMsg("IBKR deposit saved"); }
    catch(e) { showMsg("Saved locally only", true); }
    setIbkrInput("");
  }

  async function updateIBKRValue(val) {
    update({ ibkrValue: val });
    try { await saveSetting("ibkrValue", val); showMsg("Portfolio updated"); }
    catch(e) {}
  }

  async function updateEGP(val) {
    update({ egpRate: val });
    try { await saveSetting("egpRate", val); } catch(e) {}
  }

  async function updateCash(val) {
    update({ cashReserve: val });
    try { await saveSetting("cashReserve", val); } catch(e) {}
  }

  async function updateCap(key, val) {
    const newCaps = { ...s.caps, [key]: val };
    update({ caps: newCaps });
    try { await saveSetting("caps", newCaps); } catch(e) {}
  }

  async function closeMonth() {
    const surplus = Object.fromEntries(CATS.map(c => [c.key, Math.max(0, s.caps[c.key]-(spent[c.key]||0))]));
    const totalSurplus = Object.values(surplus).reduce((a,b) => a+b, 0);
    const toIBKR = rollMode === "ibkr" ? Math.max(0,investable)+totalSurplus : Math.max(0,investable);
    const record = {
      month:NOW_MONTH, cats:{...spent}, caps:{...s.caps},
      investedSAR:Math.round(toIBKR), investedUSD:Math.round(toIBKR*SAR_USD),
      surplusSAR:Math.round(totalSurplus), fixedTotal:Math.round(fixedTotal),
      totalOut:Math.round(totalOut), rollMode,
    };
    const existing = s.monthHistory.filter(h => h.month !== NOW_MONTH);
    update({ monthHistory: [...existing, record] });
    try {
      await sheetsAppend("Monthly", [
        record.month, record.investedSAR, record.investedUSD, record.surplusSAR,
        record.fixedTotal, record.totalOut, record.rollMode,
        JSON.stringify(record.cats), JSON.stringify(record.caps)
      ]);
      showMsg("Month closed and saved to Sheets");
    } catch(e) { showMsg("Closed locally - Sheets sync failed", true); }
    setConfirmClose(false);
  }

  async function refreshFromSheets() {
    setSyncing(true);
    try {
      const data = await loadFromSheets();
      setS(data); showMsg("Refreshed from Google Sheets");
    } catch(e) { showMsg("Refresh failed", true); }
    setSyncing(false);
  }

  const inp = (extra={}) => ({
    background:T.card2, border:`1px solid ${T.border}`, borderRadius:8,
    padding:"9px 10px", color:T.text, fontSize:13, fontFamily:"inherit",
    outline:"none", width:"100%", boxSizing:"border-box", ...extra
  });

  // ---- LOADING ---------------------------------------------------------------
  if (!loaded) return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex",
      flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
      <div style={{ fontSize:13, color:T.gold, fontWeight:700 }}>Connecting to Google Sheets...</div>
      <div style={{ fontSize:11, color:T.sub }}>Loading your financial data</div>
      <div style={{ width:160, height:3, background:T.border, borderRadius:99 }}>
        <div style={{ width:"60%", height:"100%", background:T.gold, borderRadius:99 }} />
      </div>
    </div>
  );

  // ---- MAIN RENDER -----------------------------------------------------------
  return (
    <div style={{ minHeight:"100vh", background:T.bg, color:T.text,
      fontFamily:"-apple-system,'Inter',sans-serif", fontSize:13,
      maxWidth:430, margin:"0 auto", paddingBottom:82 }}>

      <Toast msg={toast?.msg} err={toast?.err} />

      {/* HEADER */}
      <div style={{ padding:"18px 18px 12px", background:T.card,
        borderBottom:`1px solid ${T.border}`, position:"sticky", top:0, zIndex:50 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <div style={{ fontSize:9, color:T.gold, letterSpacing:"0.18em", textTransform:"uppercase", marginBottom:2 }}>
              Financial Command
            </div>
            <div style={{ fontSize:20, fontWeight:800, letterSpacing:"-0.03em" }}>Ahmad Ashraf</div>
            <div style={{ fontSize:10, color:T.sub, marginTop:1 }}>
              {new Date().toLocaleDateString("en-GB", {day:"numeric",month:"long",year:"numeric"})}
            </div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9, color:T.sub, textTransform:"uppercase", letterSpacing:"0.1em" }}>IBKR</div>
            <Mono style={{ fontSize:20, fontWeight:800, color:T.gold, display:"block" }}>{fUSD(s.ibkrValue)}</Mono>
            <div style={{ fontSize:9, color:fire.pct>50?T.green:T.sub }}>{fire.pct.toFixed(1)}% to FIRE</div>
          </div>
        </div>

        <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6,
          background:T.card2, borderRadius:10, padding:"10px 12px", border:`1px solid ${T.border}` }}>
          {[
            { l:"Spent",   v:`${fSAR(Math.round(totalVar))} SAR`,                   c:T.dim    },
            { l:"Fixed",   v:`${fSAR(Math.round(fixedTotal))} SAR`,                 c:T.sub    },
            { l:"-> IBKR", v:`${fSAR(Math.max(0,Math.round(investable)))} SAR`,     c:remColor },
          ].map(i => (
            <div key={i.l} style={{ textAlign:"center" }}>
              <div style={{ fontSize:8, color:T.muted, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:2 }}>{i.l}</div>
              <Mono style={{ fontSize:11, fontWeight:700, color:i.c }}>{i.v}</Mono>
            </div>
          ))}
        </div>

        <div style={{ marginTop:8, display:"flex", gap:6, alignItems:"center" }}>
          <div style={{ fontSize:9, fontWeight:700, textTransform:"uppercase",
            background:monthType==="light"?T.green+"25":T.gold+"25",
            color:monthType==="light"?T.green:T.gold,
            border:`1px solid ${monthType==="light"?T.green:T.gold}40`,

            {[
              { label:"Apr 2027 Maintenance Reserve", amount:Math.round(maintSAR(s.egpRate)), note:"EGP 1,707,225 reserved", color:T.gold },
              { label:"Free to Deploy", amount:Math.round(Math.max(0,s.cashReserve-maintSAR(s.egpRate))), note:"IBKR lump sum or emergency buffer", color:T.green },
            ].map(item => (
              <Card key={item.label} style={{ marginBottom:10, border:`1px solid ${item.color}30` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:700, color:item.color }}>{item.label}</div>
                    <div style={{ fontSize:10, color:T.sub, marginTop:3, lineHeight:1.5 }}>{item.note}</div>
                  </div>
                  <Mono style={{ fontSize:16, fontWeight:800, color:item.color, marginLeft:10 }}>SAR {fSAR(item.amount)}</Mono>
                </div>
                <div style={{ background:T.border, borderRadius:99, height:5 }}>
                  <div style={{ width:`${Math.min(100,(item.amount/s.cashReserve)*100)}%`, height:"100%", background:item.color, borderRadius:99 }} />
                </div>
              </Card>
            ))}

            <Card style={{ marginTop:4, textAlign:"center" }}>
              <Lbl>April 2027 Countdown</Lbl>
              {(() => {
                const days = Math.ceil((new Date("2027-04-01")-new Date())/86400000);
                const ok = s.cashReserve >= maintSAR(s.egpRate);
                return <>
                  <Mono style={{ fontSize:40, fontWeight:900, display:"block", color:days<180?T.red:T.dim }}>{days}</Mono>
                  <div style={{ fontSize:10, color:T.sub, marginBottom:10 }}>days away</div>
                  <div style={{ padding:"10px 14px", borderRadius:8,
                    background:ok?T.green+"15":T.red+"15",
                    border:`1px solid ${ok?T.green:T.red}30` }}>
                    <div style={{ fontSize:11, fontWeight:600, color:ok?T.green:T.red }}>
                      {ok ? "Fully funded from existing cash" : "Insufficient - top up reserve"}
                    </div>
                    <div style={{ fontSize:10, color:T.sub, marginTop:3 }}>
                      Need SAR {fSAR(Math.round(maintSAR(s.egpRate)))} - Have SAR {fSAR(s.cashReserve)}
                    </div>
                  </div>
                </>;
              })()}
            </Card>
          </div>
        )}

        {/* ===== RATES ===== */}
        {tab === "Rates" && (
          <div>
            <Card style={{ marginBottom:14 }}>
              <Lbl>EGP / SAR Rate</Lbl>
              <div style={{ textAlign:"center", marginBottom:12 }}>
                <input type="number" step="0.01" value={s.egpRate}
                  onChange={e => updateEGP(+e.target.value)}
                  style={{ background:"none", border:"none", fontSize:40, fontWeight:900, color:T.gold,
                    fontFamily:"'DM Mono',monospace", textAlign:"center", width:"100%", outline:"none" }} />
                <div style={{ fontSize:10, color:T.sub }}>EGP per SAR</div>
              </div>
              {[
                { l:"Solana Instalment (EGP 432,225)",      v:Math.round(EGP_A/s.egpRate)   },
                { l:"Baghush Instalment (EGP 638,934)",     v:Math.round(EGP_B/s.egpRate)   },
                { l:"AXA Insurance (EGP 25,000/mo)",        v:Math.round(EGP_AXA/s.egpRate) },
                { l:"Apr 2027 Maintenance (EGP 1,707,225)", v:Math.round(EGP_M/s.egpRate), hi:true },
              ].map((r,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between",
                  padding:"9px 0", borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ fontSize:11, color:r.hi?T.gold:T.sub, flex:1 }}>{r.l}</span>
                  <Mono style={{ fontSize:11, color:r.hi?T.gold:T.dim }}>SAR {fSAR(r.v)}</Mono>
                </div>
              ))}
            </Card>

            <Card>
              <Lbl>Sync</Lbl>
              <button onClick={refreshFromSheets} style={{
                width:"100%", background:T.gold, border:"none", borderRadius:8,
                color:"#07080B", fontWeight:700, fontSize:12, padding:"12px",
                cursor:"pointer", fontFamily:"inherit", marginBottom:10 }}>
                {syncing ? "Refreshing..." : "Refresh from Google Sheets"}
              </button>
              <div style={{ fontSize:10, color:T.sub, lineHeight:1.6 }}>
                All data is stored in your Google Sheet at sheets.google.com.
                You can view, edit, or export it there at any time.
              </div>
            </Card>
          </div>
        )}

      </div>

      {/* BOTTOM NAV */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
        width:"100%", maxWidth:430, background:T.card+"F2",
        backdropFilter:"blur(20px)", borderTop:`1px solid ${T.border}`,
        display:"flex", justifyContent:"space-around", padding:"6px 0 14px", zIndex:100 }}>
        {TABS.map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            background:"none", border:"none", cursor:"pointer",
            display:"flex", flexDirection:"column", alignItems:"center",
            gap:2, padding:"5px 8px", fontFamily:"inherit" }}>
            <span style={{ fontSize:11, fontWeight:tab===t?700:400,
              color:tab===t?T.gold:T.muted, letterSpacing:"0.06em", textTransform:"uppercase" }}>{t}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
